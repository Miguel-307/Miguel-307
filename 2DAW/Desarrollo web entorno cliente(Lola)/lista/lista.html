<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista dinámica con eliminación</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 60px;
    }

    h1 {
      color: #333;
    }

    ul {
      list-style-type: none;
      padding: 0;
      width: 300px;
    }

    li {
      background-color: white;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.3s ease;
    }

    li:hover {
      background-color: #f9f9f9;
    }

    .close {
      color: red;
      font-weight: bold;
      cursor: pointer;
      margin-left: 10px;
      transition: color 0.3s;
    }

    .close:hover {
      color: darkred;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

  <h1>Lista de elementos</h1>

  <ul id="miLista">
    <li>Tarea 1 <span class="close">✖</span></li>
    <li>Tarea 2 <span class="close">✖</span></li>
    <li>Tarea 3 <span class="close">✖</span></li>
  </ul>

  <button id="btnAñadir">Añadir elemento</button>

  <script>
    // función para eliminar un elemento al hacer clic en el aspa
    function asignarEventosCerrar() {
      const botonesCerrar = document.getElementsByClassName("close");
      for (let i = 0; i < botonesCerrar.length; i++) {
        botonesCerrar[i].onclick = function() {
          this.parentElement.remove();
        };
      }
    }

    // función para añadir un nuevo elemento
    document.getElementById("btnAñadir").onclick = function() {
      const texto = prompt("Introduce el texto del nuevo elemento:");
      if (texto && texto.trim() !== "") {
        const li = document.createElement("li");
        li.textContent = texto;
        const span = document.createElement("span");
        span.textContent = "✖";
        span.className = "close";
        li.appendChild(span);
        document.getElementById("miLista").appendChild(li);
        asignarEventosCerrar(); // re-asigna eventos a las nuevas aspas
      }
    };

    // inicializa los eventos al cargar
    asignarEventosCerrar();
  </script>

</body>
</html>
