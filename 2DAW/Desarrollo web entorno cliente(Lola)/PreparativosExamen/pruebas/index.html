<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Invitados</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        ul { list-style: none; padding: 0; }
        li { background: #f4f4f4; margin-bottom: 5px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .btn-delete { background: #dc3545; font-size: 0.8rem; padding: 4px 8px; }
        .btn-delete:hover { background: #a71d2a; }
        #contador-box { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📋 Lista de Invitados</h1>
    
    <div class="input-group">
        <input type="text" id="guestInput" placeholder="Nombre del invitado...">
        <button id="addBtn">Añadir</button>
    </div>

    <ul id="guestList">
        </ul>

    <div id="contador-box">
        Total invitados: <span id="totalCount">0</span>
    </div>

    <script src="index.js"></script>
</body>
</html>
