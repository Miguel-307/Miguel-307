<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 7.22 - Escritura Dinámica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #parrafo-dinamico {
            min-height: 100px;
            border: 1px solid #e5e7eb;
            padding: 1rem;
            background-color: white;
            border-radius: 0.5rem;
            font-family: 'Courier New', Courier, monospace;
            word-wrap: break-word; /* Asegura que el texto largo baje de línea */
        }
    </style>
</head>
<body class="bg-gray-100 p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Ejercicio 7.22</h1>
        </header>

        <section class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4 text-green-600">Escritura Dinámica</h2>
            <p class="mb-4 text-sm text-gray-500">Escribe libremente con tu teclado y el texto aparecerá abajo.</p>
            
            <p id="parrafo-dinamico"></p>
            
            <button onclick="limpiarParrafo()" class="mt-4 px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition">
                Limpiar Párrafo
            </button>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.addEventListener('keydown', gestionarEjercicio722);
        });

        function gestionarEjercicio722(evento) {
            const tecla = evento.key;

        if (tecla.length === 1) {
                agregarLetraAParrafo(tecla);
            }
        }

        function agregarLetraAParrafo(caracter) {
            const parrafo = document.getElementById('parrafo-dinamico');
            parrafo.textContent += caracter;
        }

        function limpiarParrafo() {
            const parrafo = document.getElementById('parrafo-dinamico');
            parrafo.textContent = "";
        }
    </script>
</body>
</html>
